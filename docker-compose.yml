version: '3.8'

networks:
  anpr-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  mosquitto_data:
  mosquitto_log:

services:
  db:
    image: postgres:15-alpine
    container_name: anpr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: anpr_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - anpr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anpr_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - anpr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: anpr_mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - anpr-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anpr_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/anpr_db
      - REDIS_URL=redis://redis:6379/0
      - MQTT_BROKER_URL=mqtt
      - MQTT_BROKER_PORT=1883
      - CORS_ORIGINS=["http://localhost:3000", "https://six.itb.ac.id"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mqtt:
        condition: service_started
    networks:
      - anpr-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anpr_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - anpr-network
